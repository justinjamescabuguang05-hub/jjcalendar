<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>2026 Calendar</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(to right, #74ebd5, #ACB6E5);
      font-family: Arial, sans-serif;
    }

    h1 {
      text-align: center;
      margin: 20px;
      font-weight: bold;
    }

    .month {
      background: white;
      padding: 15px;
      margin: 15px 0;
      border-radius: 10px;
      box-shadow: 2px 2px 10px rgba(0,0,0,0.1);
    }

    th {
      background-color: #007bff;
      color: white;
    }

    td {
      height: 40px;
      text-align: center;
    }
  </style>
</head>
<body>

<h1>2026 Calendar</h1>

<div class="container" id="calendar"></div>

<script>
const months = [
  {name: "January", days: 31, start: 4},
  {name: "February", days: 28, start: 0},
  {name: "March", days: 31, start: 0},
  {name: "April", days: 30, start: 3},
  {name: "May", days: 31, start: 5},
  {name: "June", days: 30, start: 1},
  {name: "July", days: 31, start: 3},
  {name: "August", days: 31, start: 6},
  {name: "September", days: 30, start: 2},
  {name: "October", days: 31, start: 4},
  {name: "November", days: 30, start: 0},
  {name: "December", days: 31, start: 2}
];

const container = document.getElementById("calendar");

months.forEach(m => {
  let html = `
    <div class="month">
      <h3>${m.name} 2026</h3>
      <table class="table table-bordered">
        <tr>
          <th>Sun</th><th>Mon</th><th>Tue</th>
          <th>Wed</th><th>Thu</th><th>Fri</th><th>Sat</th>
        </tr>
        <tr>
  `;

  let day = 1;

  // Empty cells
  for (let i = 0; i < m.start; i++) {
    html += "<td></td>";
  }

  for (let i = m.start; i < 7; i++) {
    html += `<td>${day++}</td>`;
  }

  html += "</tr>";

  while (day <= m.days) {
    html += "<tr>";
    for (let i = 0; i < 7 && day <= m.days; i++) {
      html += `<td>${day++}</td>`;
    }
    html += "</tr>";
  }

  html += `
      </table>
    </div>
  `;

  container.innerHTML += html;
});
</script>


</body>
</html>
